spring:
  application:
    name: aiops-hub

  datasource:
    url: jdbc:postgresql://localhost:5432/aiops
    username: aiops
    password: aiops_secret
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns schema, not Hibernate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    com.aiops: DEBUG

